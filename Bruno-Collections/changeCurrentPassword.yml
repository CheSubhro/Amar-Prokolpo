info:
  name: ChangeCurrentPassword
  type: http
  seq: 10

http:
  method: PATCH
  url: "{{baseUrl}}/users/change-password"
  body:
    type: json
    data: |-
      {
        "oldPassword": "{{oldPassword}}",
        "newPassword": "{{newPassword}}"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
