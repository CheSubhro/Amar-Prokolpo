info:
  name: Create Category
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/category/create"
  body:
    type: multipart-form
    data:
      - name: name
        type: text
        value: Shiksha Sahayata Prakalpa
        contentType: Text
      - name: description
        type: text
        value: Government grant scheme for students.
        contentType: Text
      - name: order
        type: text
        value: "1"
        contentType: Text
      - name: isActive
        type: text
        value: "true"
        contentType: Text
      - name: icon
        type: file
        value:
          - C:\Users\CHE\Downloads\icon.jpg
        contentType: File
      - name: image
        type: file
        value:
          - C:\Users\CHE\Downloads\Shiksha Sahayata Prakalpa.jpg
        contentType: File
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
