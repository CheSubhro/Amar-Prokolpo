info:
  name: createScheme
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/scheme/create"
  body:
    type: multipart-form
    data:
      - name: title
        type: text
        value: National Merit Scholarship Scheme
        contentType: Text
      - name: shortDescription
        type: text
        value: Financial assistance for students
        contentType: Text
      - name: description
        type: text
        value: Detailed info about merit scholarship scheme
        contentType: Text
      - name: category
        type: text
        value: 6a47ba03e2ab9f0ca5577af2
        contentType: Text
      - name: image
        type: file
        value:
          - C:\Users\CHE\Downloads\National Merit Scholarship Scheme.jpg
        contentType: image/jpeg
      - name: benefits
        type: text
        value: '["Monthly stipend", "Book allowance"]'
        contentType: Text
      - name: eligibility
        type: text
        value: '["Must be 10th pass", "Family income < 2.5L"]'
        contentType: Text
      - name: applicationProcess
        type: text
        value: '["Register on portal", "Upload documents"]'
        contentType: Text
      - name: applicationLink
        type: text
        value: https://scholarship.gov.in
        contentType: Text
      - name: helplineNumber
        type: text
        value: "1800112233"
        contentType: Text
      - name: officialEmail
        type: text
        value: support@scholarship.gov.in
        contentType: Text
      - name: status
        type: text
        value: Active
        contentType: Text
      - name: featured
        type: text
        value: "true"
        contentType: Text
      - name: requiredDocuments
        type: text
        value: '["Aadhar Card", "Voter ID", "Income Certificate"]'
        contentType: Text
      - name: faqs
        type: text
        value: '[{"question": "How to apply?", "answer": "Go to website"}, {"question": "Is it free?", "answer": "Yes"}]'
        contentType: Text
      - name: deadline
        type: text
        value: 2026-12-31
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
