info:
  name: Get All Scheme
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/scheme/all/?status=Active&featured=true"
  params:
    - name: status
      value: Active
      type: query
    - name: featured
      value: "true"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
