info:
  name: Create Ticket - Public/User
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/support/create"
  body:
    type: json
    data: |-
      {
        "name": "Subhra",
        "email": "test@example.com",
        "subject": "Website Loading Issue",
        "message": "The page takes too long to load on mobile.",
        "priority": "High"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
